<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Kanban</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

    :root {
      --bg-main: #0a0a0f;
      --bg-card: #0f0f1a;
      --neon-orange-1: #ff6b00;
      --neon-orange-2: #ff8c00;
      --text-yellow-1: #ffe600;
      --text-yellow-2: #ffd000;
      --text-white: #e8e8ff;
      --red-alert: #ff0033;
      --green-done: #00ff88;
      
      --shadow-neon: 0 0 15px rgba(255,107,0,0.3), 0 0 30px rgba(255,107,0,0.1);
      --shadow-neon-hover: 0 0 20px rgba(255,107,0,0.5), 0 0 40px rgba(255,107,0,0.3);
      --shadow-red: 0 0 20px rgba(255,0,51,0.5);
      --border-neon: 1px solid rgba(255,107,0,0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-white);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      /* Grid pattern sutil */
      background-image: 
        linear-gradient(rgba(255, 107, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 107, 0, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      position: relative;
    }

    /* Scan-line overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0, 0, 0, 0.25) 51%
      );
      background-size: 100% 4px;
      opacity: 0.2;
      pointer-events: none;
      z-index: 9999;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-main);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--neon-orange-1);
      border-radius: 4px;
    }

    h1, h2, h3, .brand {
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .brand {
      color: var(--neon-orange-1);
      text-shadow: 0 0 10px var(--neon-orange-1);
      font-weight: 900;
    }

    /* --- Auth View --- */
    #auth-view {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
    }

    .auth-card {
      background-color: var(--bg-card);
      border: var(--border-neon);
      box-shadow: var(--shadow-neon);
      padding: 40px;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      animation: fadeInSlideUp 0.6s ease-out;
    }

    .auth-card h2 {
      margin-bottom: 20px;
      color: var(--text-yellow-1);
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-yellow-2);
      font-weight: 600;
    }

    .form-control {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(255,107,0,0.3);
      color: var(--text-white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      border-radius: 4px;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--neon-orange-1);
      box-shadow: 0 0 10px rgba(255,107,0,0.5);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 2px solid var(--neon-orange-1);
      color: var(--neon-orange-1);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s ease;
      text-shadow: 0 0 5px rgba(255,107,0,0.5);
    }

    .btn:hover {
      background: var(--neon-orange-1);
      color: var(--bg-main);
      box-shadow: 0 0 15px var(--neon-orange-1);
    }

    .toggle-auth {
      margin-top: 20px;
      color: var(--text-yellow-2);
      cursor: pointer;
      text-decoration: underline;
      font-size: 14px;
    }

    .error-msg {
      color: var(--red-alert);
      margin-top: 10px;
      font-weight: 600;
      display: none;
    }

    /* --- App View --- */
    #app-view {
      display: none;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,107,0,0.2);
    }

    .header-controls {
      display: flex;
      gap: 15px;
    }

    .btn-sm {
      width: auto;
      padding: 8px 16px;
      font-size: 14px;
    }

    /* Dashboard */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--bg-card);
      border: var(--border-neon);
      padding: 20px;
      border-radius: 8px;
      box-shadow: var(--shadow-neon);
      display: flex;
      align-items: center;
      gap: 15px;
      transition: transform 0.3s ease;
    }
    
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-neon-hover);
    }

    .stat-icon {
      width: 40px;
      height: 40px;
      fill: var(--neon-orange-1);
      filter: drop-shadow(0 0 5px var(--neon-orange-1));
    }

    .stat-info h3 {
      font-size: 14px;
      color: var(--text-yellow-2);
      margin-bottom: 5px;
    }

    .stat-number {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      color: var(--text-yellow-1);
      font-weight: 900;
    }

    .stat-card.overdue {
      border-color: var(--red-alert);
      box-shadow: var(--shadow-red);
    }
    .stat-card.overdue .stat-icon {
      fill: var(--red-alert);
      filter: drop-shadow(0 0 5px var(--red-alert));
    }
    .stat-card.overdue .stat-number {
      color: var(--red-alert);
    }

    /* Kanban Board */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      align-items: start;
    }

    .column {
      background: rgba(15, 15, 26, 0.6);
      border: 1px solid rgba(255,107,0,0.1);
      border-radius: 8px;
      min-height: 500px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .column::after {
      content: '';
      position: absolute;
      top: 0;
      right: -10px;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(255,107,0,0.5), transparent);
    }
    .column:last-child::after { display: none; }

    .column-header {
      padding: 15px;
      background: linear-gradient(90deg, rgba(255,107,0,0.2) 0%, transparent 100%);
      border-bottom: 1px solid rgba(255,107,0,0.3);
      border-radius: 8px 8px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .column-header h2 {
      font-size: 16px;
      color: var(--text-yellow-1);
    }

    .task-count {
      background: rgba(255,107,0,0.2);
      color: var(--neon-orange-1);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }

    .column-body {
      padding: 15px;
      flex-grow: 1;
      overflow-y: auto;
      transition: background 0.3s ease;
    }

    .column-body.drag-over {
      background: rgba(255,107,0,0.1);
      border: 2px dashed var(--neon-orange-1);
      border-radius: 4px;
    }

    /* Task Card */
    .task-card {
      background: var(--bg-card);
      border: var(--border-neon);
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      cursor: grab;
      transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
      position: relative;
      animation: fadeInSlideUp 0.4s ease-out backwards;
    }

    .task-card:active {
      cursor: grabbing;
    }

    .task-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-neon);
    }

    .task-card.dragging {
      opacity: 0.5;
      transform: rotate(2deg);
    }

    @keyframes pulseRed {
      0% { box-shadow: 0 0 10px rgba(255,0,51,0.3); }
      50% { box-shadow: 0 0 20px rgba(255,0,51,0.7); border-color: var(--red-alert); }
      100% { box-shadow: 0 0 10px rgba(255,0,51,0.3); }
    }

    .task-card.overdue {
      border: 2px solid var(--red-alert);
      animation: pulseRed 2s infinite;
    }

    .task-card.completed {
      opacity: 0.6;
      border-color: var(--green-done);
      box-shadow: 0 0 10px rgba(0,255,136,0.2);
    }
    .task-card.completed .task-title {
      text-decoration: line-through;
      color: rgba(232, 232, 255, 0.6);
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .task-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--text-yellow-1);
      word-break: break-word;
    }

    .task-desc {
      font-size: 14px;
      color: var(--text-white);
      margin-bottom: 15px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .task-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 10px;
    }

    .task-date {
      font-size: 12px;
      color: var(--text-yellow-2);
    }
    .task-card.overdue .task-date {
      color: var(--red-alert);
      font-weight: bold;
    }

    .task-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-yellow-2);
      transition: color 0.2s;
    }
    .icon-btn:hover { color: var(--neon-orange-1); }
    .icon-btn.delete:hover { color: var(--red-alert); }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: var(--bg-main);
      position: relative;
    }
    
    .avatar:hover::after {
      content: attr(title);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      color: var(--text-white);
      padding: 4px 8px;
      border: 1px solid var(--neon-orange-1);
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      z-index: 10;
      margin-bottom: 5px;
    }

    .custom-checkbox {
      display: inline-flex;
      align-items: center;
      cursor: pointer;
    }
    .custom-checkbox input { display: none; }
    .checkmark {
      width: 18px;
      height: 18px;
      border: 2px solid var(--text-yellow-2);
      border-radius: 3px;
      position: relative;
      transition: all 0.2s;
    }
    .custom-checkbox input:checked ~ .checkmark {
      background: var(--green-done);
      border-color: var(--green-done);
      box-shadow: 0 0 10px var(--green-done);
    }
    .checkmark::after {
      content: '';
      position: absolute;
      display: none;
      left: 5px;
      top: 1px;
      width: 4px;
      height: 9px;
      border: solid var(--bg-main);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .custom-checkbox input:checked ~ .checkmark::after { display: block; }

    /* --- Modal --- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal {
      background: var(--bg-card);
      border: var(--border-neon);
      box-shadow: var(--shadow-neon);
      padding: 30px;
      border-radius: 8px;
      width: 100%;
      max-width: 500px;
      transform: scale(0.9);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-overlay.active { display: flex; }
    .modal-overlay.active .modal {
      transform: scale(1);
      opacity: 1;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-header h2 { color: var(--text-yellow-1); }

    .close-modal {
      background: none;
      border: none;
      color: var(--text-white);
      font-size: 24px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .close-modal:hover { color: var(--neon-orange-1); }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    /* Animations */
    @keyframes fadeInSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .board { grid-template-columns: 1fr; }
      .column::after { display: none; }
    }
  </style>
</head>
<body>

  <!-- Auth View -->
  <div id="auth-view">
    <div class="auth-card">
      <h1 class="brand">NEON KANBAN</h1>
      <h2 id="auth-title">LOGIN</h2>
      <form id="auth-form">
        <div class="form-group" id="name-group" style="display: none;">
          <label for="name">Nome</label>
          <input type="text" id="name" class="form-control" placeholder="Seu nome">
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="form-control" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" class="form-control" required placeholder="******">
        </div>
        <div id="auth-error" class="error-msg"></div>
        <button type="submit" class="btn" id="auth-btn">ENTRAR</button>
      </form>
      <div class="toggle-auth" id="toggle-auth">Não tem conta? Registre-se</div>
    </div>
  </div>

  <!-- App View -->
  <div id="app-view">
    <header>
      <h1 class="brand">NEON KANBAN</h1>
      <div class="header-controls">
        <button class="btn btn-sm" id="btn-add-task">NOVA TAREFA</button>
        <button class="btn btn-sm" style="border-color: #555; color: #aaa;" id="btn-logout">LOGOUT</button>
      </div>
    </header>

    <div class="dashboard">
      <div class="stat-card">
        <svg class="stat-icon" viewBox="0 0 24 24"><path d="M4 4h4v4H4V4zm6 0h4v4h-4V4zm6 0h4v4h-4V4zM4 10h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4zM4 16h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4z"/></svg>
        <div class="stat-info">
          <h3>TOTAL</h3>
          <div class="stat-number" id="stat-total">0</div>
        </div>
      </div>
      <div class="stat-card">
        <svg class="stat-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14H11v-2h2v2zm0-4H11V7h2v5z"/></svg>
        <div class="stat-info">
          <h3>EM EXECUÇÃO</h3>
          <div class="stat-number" id="stat-doing">0</div>
        </div>
      </div>
      <div class="stat-card" style="border-color: var(--green-done)">
        <svg class="stat-icon" style="fill: var(--green-done); filter: drop-shadow(0 0 5px var(--green-done));" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        <div class="stat-info">
          <h3>CONCLUÍDAS</h3>
          <div class="stat-number" id="stat-done" style="color: var(--green-done)">0</div>
        </div>
      </div>
      <div class="stat-card overdue" id="card-overdue">
        <svg class="stat-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <div class="stat-info">
          <h3>EM ATRASO</h3>
          <div class="stat-number" id="stat-overdue">0</div>
        </div>
      </div>
    </div>

    <div class="board">
      <div class="column" data-status="todo">
        <div class="column-header">
          <h2>A FAZER</h2>
          <span class="task-count" id="count-todo">0</span>
        </div>
        <div class="column-body" id="col-todo"></div>
      </div>
      
      <div class="column" data-status="doing">
        <div class="column-header">
          <h2>FAZENDO</h2>
          <span class="task-count" id="count-doing">0</span>
        </div>
        <div class="column-body" id="col-doing"></div>
      </div>
      
      <div class="column" data-status="done">
        <div class="column-header">
          <h2>CONCLUÍDO</h2>
          <span class="task-count" id="count-done">0</span>
        </div>
        <div class="column-body" id="col-done"></div>
      </div>
    </div>
  </div>

  <!-- Modal Task -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">NOVA TAREFA</h2>
        <button class="close-modal" id="btn-close-modal">&times;</button>
      </div>
      <form id="task-form">
        <input type="hidden" id="task-id">
        <div class="form-group">
          <label for="task-title-input">Título *</label>
          <input type="text" id="task-title-input" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="task-desc">Descrição</label>
          <textarea id="task-desc" class="form-control" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="task-resp">Responsável</label>
          <input type="text" id="task-resp" class="form-control">
        </div>
        <div class="form-group">
          <label for="task-deadline">Prazo</label>
          <input type="date" id="task-deadline" class="form-control">
        </div>
        <div class="form-group">
          <label for="task-status">Status Inicial</label>
          <select id="task-status" class="form-control">
            <option value="todo">A Fazer</option>
            <option value="doing">Fazendo</option>
            <option value="done">Concluído</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-sm" style="border-color: #555; color: #aaa;" id="btn-cancel-modal">CANCELAR</button>
          <button type="submit" class="btn btn-sm">SALVAR</button>
        </div>
      </form>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    // Config & State
    const API_URL = '/api';
    let tasks = [];
    let isRegisterMode = false;

    // Elements - Auth
    const authView = document.getElementById('auth-view');
    const appView = document.getElementById('app-view');
    const authForm = document.getElementById('auth-form');
    const authTitle = document.getElementById('auth-title');
    const authBtn = document.getElementById('auth-btn');
    const toggleAuthBtn = document.getElementById('toggle-auth');
    const nameGroup = document.getElementById('name-group');
    const authError = document.getElementById('auth-error');
    
    // Elements - Modal
    const taskModal = document.getElementById('task-modal');
    const taskForm = document.getElementById('task-form');
    const btnAddTask = document.getElementById('btn-add-task');
    const btnCloseModal = document.getElementById('btn-close-modal');
    const btnCancelModal = document.getElementById('btn-cancel-modal');

    // Utility: Simple CountUp implementation
    function animateValue(obj, start, end, duration) {
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.innerHTML = Math.floor(progress * (end - start) + start);
        if (progress < 1) {
          window.requestAnimationFrame(step);
        }
      };
      window.requestAnimationFrame(step);
    }

    // Utility: Hash string to color
    function stringToColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
      return '#' + '00000'.substring(0, 6 - c.length) + c;
    }

    // Utility: Format Date
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-');
      return `${d}/${m}/${y}`;
    }

    // Auth Logic
    toggleAuthBtn.addEventListener('click', () => {
      isRegisterMode = !isRegisterMode;
      authTitle.innerText = isRegisterMode ? 'REGISTRO' : 'LOGIN';
      authBtn.innerText = isRegisterMode ? 'REGISTRAR' : 'ENTRAR';
      toggleAuthBtn.innerText = isRegisterMode ? 'Já tem conta? Faça login' : 'Não tem conta? Registre-se';
      nameGroup.style.display = isRegisterMode ? 'block' : 'none';
      document.getElementById('name').required = isRegisterMode;
      authError.style.display = 'none';
    });

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value;
      
      const endpoint = isRegisterMode ? '/auth/register' : '/auth/login';
      const payload = isRegisterMode ? { name, email, password } : { email, password };

      try {
        const res = await fetch(`${API_URL}${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.message);

        if (isRegisterMode) {
          // Auto login or switch to login
          toggleAuthBtn.click();
          authError.innerText = 'Registrado com sucesso. Faça login.';
          authError.style.color = 'var(--green-done)';
          authError.style.display = 'block';
        } else {
          localStorage.setItem('neon_token', data.token);
          localStorage.setItem('neon_user', JSON.stringify(data.user));
          initApp();
        }
      } catch (err) {
        authError.innerText = err.message;
        authError.style.color = 'var(--red-alert)';
        authError.style.display = 'block';
      }
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.removeItem('neon_token');
      localStorage.removeItem('neon_user');
      appView.style.display = 'none';
      authView.style.display = 'flex';
      authForm.reset();
    });

    // API Wrapper
    async function apiFetch(endpoint, options = {}) {
      const token = localStorage.getItem('neon_token');
      if (!token) {
        logout();
        throw new Error('No token');
      }

      const res = await fetch(`${API_URL}${endpoint}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
          ...(options.headers || {})
        }
      });

      if (res.status === 401) {
        logout();
        throw new Error('Token expired');
      }

      return res.json();
    }

    function logout() {
      localStorage.removeItem('neon_token');
      appView.style.display = 'none';
      authView.style.display = 'flex';
    }

    // Load & Render Data
    async function initApp() {
      const token = localStorage.getItem('neon_token');
      if (!token) return;

      authView.style.display = 'none';
      appView.style.display = 'block';

      await fetchTasks();
    }

    async function fetchTasks() {
      try {
        tasks = await apiFetch('/tasks');
        renderDashboard();
        renderBoard();
      } catch (err) {
        console.error(err);
      }
    }

    function renderDashboard() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const total = tasks.length;
      const doing = tasks.filter(t => t.status === 'doing').length;
      const done = tasks.filter(t => t.completed).length;
      const overdue = tasks.filter(t => {
        if (t.completed || !t.deadline) return false;
        const dl = new Date(t.deadline);
        return dl < today;
      }).length;

      animateValue(document.getElementById('stat-total'), parseInt(document.getElementById('stat-total').innerText) || 0, total, 1000);
      animateValue(document.getElementById('stat-doing'), parseInt(document.getElementById('stat-doing').innerText) || 0, doing, 1000);
      animateValue(document.getElementById('stat-done'), parseInt(document.getElementById('stat-done').innerText) || 0, done, 1000);
      animateValue(document.getElementById('stat-overdue'), parseInt(document.getElementById('stat-overdue').innerText) || 0, overdue, 1000);
    }

    function renderBoard() {
      const cols = {
        todo: document.getElementById('col-todo'),
        doing: document.getElementById('col-doing'),
        done: document.getElementById('col-done')
      };

      cols.todo.innerHTML = '';
      cols.doing.innerHTML = '';
      cols.done.innerHTML = '';

      let count = { todo: 0, doing: 0, done: 0 };
      
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      tasks.forEach((task, index) => {
        count[task.status]++;
        
        let isOverdue = false;
        if (task.deadline && !task.completed) {
          const dl = new Date(task.deadline);
          if (dl < today) isOverdue = true;
        }

        const card = document.createElement('div');
        card.className = `task-card ${isOverdue ? 'overdue' : ''} ${task.completed ? 'completed' : ''}`;
        card.draggable = true;
        card.dataset.id = task.id;
        card.style.animationDelay = `${index * 0.05}s`;

        const bgColor = stringToColor(task.responsible);

        card.innerHTML = `
          <div class="task-header">
            <div class="task-title">${task.title}</div>
            <div class="task-actions">
              <button class="icon-btn edit-task" title="Editar">✎</button>
              <button class="icon-btn delete delete-task" title="Excluir">✕</button>
            </div>
          </div>
          <div class="task-desc">${task.description}</div>
          <div class="task-footer">
            <div class="task-actions">
              <label class="custom-checkbox" title="Marcar/Desmarcar">
                <input type="checkbox" class="complete-cb" ${task.completed ? 'checked' : ''}>
                <span class="checkmark"></span>
              </label>
              <span class="task-date">${task.deadline ? formatDate(task.deadline) : 'Sem prazo'}</span>
            </div>
            <div class="avatar" style="background-color: ${bgColor}" title="${task.responsible}">
              ${task.responsibleAvatar}
            </div>
          </div>
        `;

        // Events for Card
        card.addEventListener('dragstart', handleDragStart);
        card.addEventListener('dragend', handleDragEnd);

        card.querySelector('.delete-task').addEventListener('click', () => deleteTask(task.id));
        card.querySelector('.edit-task').addEventListener('click', () => openModal(task));
        card.querySelector('.complete-cb').addEventListener('change', (e) => toggleComplete(task.id, e.target.checked));

        cols[task.status].appendChild(card);
      });

      document.getElementById('count-todo').innerText = count.todo;
      document.getElementById('count-doing').innerText = count.doing;
      document.getElementById('count-done').innerText = count.done;
    }

    // Modal Logic
    function openModal(task = null) {
      if (task) {
        document.getElementById('modal-title').innerText = 'EDITAR TAREFA';
        document.getElementById('task-id').value = task.id;
        document.getElementById('task-title-input').value = task.title;
        document.getElementById('task-desc').value = task.description;
        document.getElementById('task-resp').value = task.responsible;
        document.getElementById('task-deadline').value = task.deadline || '';
        document.getElementById('task-status').value = task.status;
      } else {
        document.getElementById('modal-title').innerText = 'NOVA TAREFA';
        taskForm.reset();
        document.getElementById('task-id').value = '';
        const user = JSON.parse(localStorage.getItem('neon_user'));
        if(user) document.getElementById('task-resp').value = user.name;
      }
      taskModal.classList.add('active');
    }

    function closeModal() {
      taskModal.classList.remove('active');
    }

    btnAddTask.addEventListener('click', () => openModal());
    btnCloseModal.addEventListener('click', closeModal);
    btnCancelModal.addEventListener('click', closeModal);

    taskForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('task-id').value;
      const payload = {
        title: document.getElementById('task-title-input').value,
        description: document.getElementById('task-desc').value,
        responsible: document.getElementById('task-resp').value,
        deadline: document.getElementById('task-deadline').value,
        status: document.getElementById('task-status').value
      };

      try {
        if (id) {
          await apiFetch(`/tasks/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        } else {
          await apiFetch(`/tasks`, { method: 'POST', body: JSON.stringify(payload) });
        }
        closeModal();
        fetchTasks();
      } catch (err) {
        alert('Erro ao salvar tarefa: ' + err.message);
      }
    });

    // Task Actions
    async function deleteTask(id) {
      if (!confirm('Tem certeza que deseja excluir esta tarefa?')) return;
      try {
        await apiFetch(`/tasks/${id}`, { method: 'DELETE' });
        fetchTasks();
      } catch (err) {
        console.error(err);
      }
    }

    async function toggleComplete(id, completed) {
      try {
        await apiFetch(`/tasks/${id}/status`, { 
          method: 'PATCH', 
          body: JSON.stringify({ completed }) 
        });
        fetchTasks();
      } catch (err) {
        console.error(err);
      }
    }

    async function updateTaskStatus(id, newStatus) {
      try {
        await apiFetch(`/tasks/${id}/status`, { 
          method: 'PATCH', 
          body: JSON.stringify({ status: newStatus }) 
        });
        fetchTasks();
      } catch (err) {
        console.error(err);
      }
    }

    // Drag and Drop Logic
    let draggedCard = null;

    function handleDragStart(e) {
      draggedCard = this;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', this.dataset.id);
    }

    function handleDragEnd(e) {
      this.classList.remove('dragging');
      draggedCard = null;
      document.querySelectorAll('.column-body').forEach(col => col.classList.remove('drag-over'));
    }

    const columns = document.querySelectorAll('.column-body');
    columns.forEach(col => {
      col.addEventListener('dragover', e => {
        e.preventDefault();
        col.classList.add('drag-over');
      });

      col.addEventListener('dragleave', () => {
        col.classList.remove('drag-over');
      });

      col.addEventListener('drop', e => {
        e.preventDefault();
        col.classList.remove('drag-over');
        
        const id = e.dataTransfer.getData('text/plain');
        const newStatus = col.parentElement.dataset.status;
        
        const task = tasks.find(t => t.id === id);
        if (task && task.status !== newStatus) {
          // Optimistic UI update
          col.appendChild(draggedCard);
          updateTaskStatus(id, newStatus);
        }
      });
    });

    // Init
    if (localStorage.getItem('neon_token')) {
      initApp();
    }
  </script>
</body>
</html>
